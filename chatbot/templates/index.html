<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Study Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">

<style>

:root{
    --bg:#0f172a;
    --sidebar:#111827;
    --card:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.08);
    --user:#4f46e5;
    --bot:#1e293b;
    --text:#f8fafc;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
    radial-gradient(circle at top left,#312e81,#0f172a 40%),
    radial-gradient(circle at bottom right,#0ea5e9,#0f172a 40%);
    color:var(--text);
    height:100vh;
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
}

.sidebar{
    height:100vh;
    background:rgba(17,24,39,0.9);
    backdrop-filter:blur(15px);
    border-right:1px solid var(--border);
}

.logo{
    font-size:24px;
    font-weight:700;
    text-align:center;
    margin-top:20px;
    margin-bottom:25px;
}

.new-chat{
    width:100%;
    border:none;
    padding:14px;
    border-radius:14px;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    color:white;
    transition:.3s;
}

.new-chat:hover{
    transform:translateY(-2px);
}

.chat-history{
    margin-top:25px;
}

.chat-item{
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
    cursor:pointer;
    transition:.3s;
}

.chat-item:hover{
    background:rgba(255,255,255,0.08);
}

.main{
    height:100vh;
    display:flex;
    flex-direction:column;
}

.header{
    padding:18px;
    border-bottom:1px solid var(--border);
    backdrop-filter:blur(15px);
}

.chat-container{
    flex:1;
    overflow-y:auto;
    padding:25px;
}

.chat-container::-webkit-scrollbar{
    width:8px;
}

.chat-container::-webkit-scrollbar-thumb{
    background:#4f46e5;
    border-radius:10px;
}

.message{
    max-width:75%;
    padding:16px;
    margin-bottom:20px;
    border-radius:18px;
    animation:fadeIn .3s ease;
}

.user{
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    margin-left:auto;
}

.bot{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border:1px solid var(--border);
}

.time{
    font-size:12px;
    opacity:.7;
    margin-top:8px;
}

.input-section{
    padding:20px;
}

.input-box{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid var(--border);
    border-radius:20px;
    padding:12px;
}

.chat-input{
    background:transparent;
    border:none;
    color:white;
}

.chat-input:focus{
    background:transparent;
    color:white;
    box-shadow:none;
}

.send-btn{
    border:none;
    width:50px;
    height:50px;
    border-radius:50%;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    color:white;
    transition:.3s;
}

.send-btn:hover{
    transform:scale(1.1);
}

.welcome{
    text-align:center;
    margin-top:150px;
}

.welcome h1{
    font-size:56px;
    font-weight:700;
}

.welcome p{
    color:#cbd5e1;
}

.typing{
    display:flex;
    gap:6px;
    margin-top:5px;
}

.typing span{
    width:8px;
    height:8px;
    background:white;
    border-radius:50%;
    animation:bounce 1s infinite;
}

.typing span:nth-child(2){
    animation-delay:.2s;
}

.typing span:nth-child(3){
    animation-delay:.4s;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-8px);
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="container-fluid">
<div class="row">

<div class="col-lg-2 sidebar p-3">

<div class="logo">
<i class="fa-solid fa-brain"></i>
AI Assistant
</div>

<button class="new-chat">
<i class="fa-solid fa-plus"></i>
New Chat
</button>

<div class="chat-history">

<div class="chat-item">
<i class="fa-solid fa-message"></i>
Physics Notes
</div>

<div class="chat-item">
<i class="fa-solid fa-message"></i>
Java Programming
</div>

</div>

</div>

<div class="col-lg-10 main">

<div class="header">
<h5 class="m-0">
<i class="fa-solid fa-sparkles"></i>
AI Study Assistant
</h5>
</div>

<div class="chat-container" id="chatContainer">

<div class="welcome" id="welcome">

<h1>Hello Manoj 👋</h1>

<p>Your intelligent study companion.</p>

</div>

</div>

<div class="input-section">

<div class="input-box">

<div class="input-group">

<input
type="text"
id="messageInput"
class="form-control chat-input"
placeholder="Ask anything..."

>

<button
class="send-btn"
onclick="sendMessage()">

<i class="fa-solid fa-paper-plane"></i>

</button>

</div>

</div>

</div>

</div>

</div>
</div>

<script>

function currentTime(){
    return new Date().toLocaleTimeString([],{
        hour:'2-digit',
        minute:'2-digit'
    });
}

async function sendMessage(){

    let input=document.getElementById("messageInput");
    let msg=input.value.trim();

    if(!msg) return;

    document.getElementById("welcome")?.remove();

    let chat=document.getElementById("chatContainer");

    chat.innerHTML += `
    <div class="message user">
        ${msg}
        <div class="time">${currentTime()}</div>
    </div>
    `;

    input.value="";

    chat.innerHTML += `
    <div class="message bot" id="typing">
        Thinking...
        <div class="typing">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
    `;

    chat.scrollTop=chat.scrollHeight;

    try{

        let response=await fetch('/chat',{
            method:'POST',
            headers:{
                'Content-Type':'application/json'
            },
            body:JSON.stringify({
                message:msg
            })
        });

        let data=await response.json();

        document.getElementById("typing").remove();

        chat.innerHTML += `
        <div class="message bot">
            ${data.response}
            <div class="time">${currentTime()}</div>
        </div>
        `;

        chat.scrollTop=chat.scrollHeight;

    }catch(error){

        document.getElementById("typing").remove();

        chat.innerHTML += `
        <div class="message bot">
            Server Error
        </div>
        `;
    }
}

document.getElementById("messageInput")
.addEventListener("keypress",function(e){

    if(e.key==="Enter"){
        sendMessage();
    }

});

</script>

</body>
</html>
